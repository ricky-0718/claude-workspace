<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS コンテンツ企画</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* スピナーアニメーション */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    /* ログエリアのスクロール */
    #log-area {
      max-height: 400px;
      overflow-y: auto;
    }
    /* タブアクティブ */
    .tab-btn.active {
      border-bottom: 3px solid #2563eb;
      color: #2563eb;
      font-weight: 600;
    }
    /* ステータスバッジ */
    .badge-pending   { background: #f59e0b; color: #fff; }
    .badge-running   { background: #3b82f6; color: #fff; }
    .badge-completed { background: #10b981; color: #fff; }
    .badge-failed    { background: #ef4444; color: #fff; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

  <!-- ===== ヘッダー ===== -->
  <header class="bg-blue-600 text-white shadow">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">&#x1F4F1;</span>
        <h1 class="text-xl font-bold tracking-wide">SNS コンテンツ企画</h1>
      </div>
      <button onclick="toggleSettings()"
              class="flex items-center gap-1.5 bg-blue-500 hover:bg-blue-400 text-white text-sm px-3 py-1.5 rounded-lg transition">
        &#x2699;&#xFE0F; 設定
      </button>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8 space-y-8">

    <!-- ===== GPTs設定セクション（初期非表示） ===== -->
    <section id="settings-section" class="hidden bg-white rounded-xl shadow p-6 space-y-5">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-700">&#x2699;&#xFE0F; GPTs 設定</h2>
        <button onclick="toggleSettings()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      </div>
      <p class="text-sm text-gray-500">各SNSプラットフォームのGPTs URLと名前を設定します。ライター機能で使用されます。</p>

      <div id="gpts-form" class="space-y-4">
        <!-- Instagram -->
        <div class="border border-gray-100 rounded-lg p-4 space-y-2">
          <label class="block text-sm font-semibold text-gray-600">&#x1F7E3; Instagram</label>
          <input id="gpts-instagram-name" type="text"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                 placeholder="GPTs名（例: Instagram ライター）" />
          <input id="gpts-instagram-url" type="url"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                 placeholder="GPTs URL（例: https://chat.openai.com/g/...）" />
        </div>

        <!-- X -->
        <div class="border border-gray-100 rounded-lg p-4 space-y-2">
          <label class="block text-sm font-semibold text-gray-600">&#x1D54F; X</label>
          <input id="gpts-x-name" type="text"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                 placeholder="GPTs名（例: X ライター）" />
          <input id="gpts-x-url" type="url"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                 placeholder="GPTs URL（例: https://chat.openai.com/g/...）" />
        </div>

        <!-- YouTube -->
        <div class="border border-gray-100 rounded-lg p-4 space-y-2">
          <label class="block text-sm font-semibold text-gray-600">&#x25B6;&#xFE0F; YouTube</label>
          <input id="gpts-youtube-name" type="text"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                 placeholder="GPTs名（例: YouTube ライター）" />
          <input id="gpts-youtube-url" type="url"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                 placeholder="GPTs URL（例: https://chat.openai.com/g/...）" />
        </div>

        <!-- NOTE -->
        <div class="border border-gray-100 rounded-lg p-4 space-y-2">
          <label class="block text-sm font-semibold text-gray-600">&#x1F4DD; NOTE</label>
          <input id="gpts-note-name" type="text"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                 placeholder="GPTs名（例: NOTE ライター）" />
          <input id="gpts-note-url" type="url"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
                 placeholder="GPTs URL（例: https://chat.openai.com/g/...）" />
        </div>
      </div>

      <button id="btn-save-gpts"
              onclick="saveGptsConfig()"
              class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-6 rounded-lg transition">
        保存
      </button>
    </section>

    <!-- ===== 企画依頼フォーム ===== -->
    <section id="form-section" class="bg-white rounded-xl shadow p-6 space-y-5">
      <h2 class="text-lg font-semibold text-gray-700">企画を依頼する</h2>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">テーマ</label>
        <input id="input-theme" type="text"
               class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-400 focus:outline-none"
               placeholder="台湾留学の魅力を発信" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">ターゲット</label>
        <input id="input-target" type="text"
               class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-400 focus:outline-none"
               placeholder="高校生の保護者" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-2">SNSプラットフォーム</label>
        <div class="flex flex-wrap gap-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" value="instagram" checked class="platform-cb w-4 h-4 text-blue-600 rounded" />
            <span class="text-sm">&#x1F7E3; Instagram</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" value="x" checked class="platform-cb w-4 h-4 text-blue-600 rounded" />
            <span class="text-sm">&#x1D54F; X</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" value="youtube" checked class="platform-cb w-4 h-4 text-blue-600 rounded" />
            <span class="text-sm">&#x25B6;&#xFE0F; YouTube</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" value="note" checked class="platform-cb w-4 h-4 text-blue-600 rounded" />
            <span class="text-sm">&#x1F4DD; NOTE</span>
          </label>
        </div>
      </div>

      <button id="btn-submit"
              onclick="submitGeneration()"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg text-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
        企画開始
      </button>
    </section>

    <!-- ===== 進捗モニター（初期非表示） ===== -->
    <section id="progress-section" class="hidden bg-white rounded-xl shadow p-6 space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-700">進捗モニター</h2>
        <span id="status-badge" class="px-3 py-1 rounded-full text-xs font-semibold badge-pending">
          pending
        </span>
      </div>
      <div id="log-area" class="bg-gray-900 text-green-300 rounded-lg p-4 font-mono text-sm space-y-1">
        <p class="text-gray-500">ログが表示されます...</p>
      </div>
    </section>

    <!-- ===== 成果物表示エリア（初期非表示） ===== -->
    <section id="result-section" class="hidden bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="text-lg font-semibold text-gray-700">成果物</h2>

      <!-- コスト情報 -->
      <div id="cost-info" class="hidden text-sm text-gray-500 flex gap-4"></div>

      <!-- タブバー -->
      <div id="tab-bar" class="flex border-b border-gray-200 gap-1"></div>

      <!-- タブコンテンツ -->
      <div id="tab-content" class="relative">
        <button onclick="copyCurrentTab()"
                class="absolute top-2 right-2 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs px-3 py-1 rounded transition">
          コピー
        </button>
        <pre id="tab-pre" class="bg-gray-50 rounded-lg p-4 whitespace-pre-wrap text-sm leading-relaxed min-h-[120px] overflow-x-auto"></pre>
      </div>
    </section>

    <!-- ===== 過去の結果一覧 ===== -->
    <section id="history-section" class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-700">過去の結果</h2>
      <div id="history-list" class="space-y-3">
        <p class="text-gray-400 text-sm">読み込み中...</p>
      </div>
    </section>

  </main>

  <!-- ===== 詳細モーダル ===== -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[85vh] flex flex-col">
      <div class="flex items-center justify-between p-5 border-b">
        <h3 id="modal-title" class="text-lg font-semibold"></h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      </div>
      <div id="modal-body" class="p-5 overflow-y-auto flex-1 space-y-4"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
