<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code タスク承認</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      background: #1e1e2e;
      color: white;
      padding: 20px 24px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .body { padding: 24px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .field .value {
      font-size: 16px;
      font-weight: 500;
    }
    .notes {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
    }
    .warning {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      color: #6d5500;
      margin-bottom: 16px;
    }
    .actions { padding: 0 24px 24px; }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-execute {
      background: #4caf50;
      color: white;
    }
    .btn-execute:hover { background: #43a047; }
    .btn-execute:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      text-align: center;
      padding: 16px;
      font-size: 14px;
      display: none;
    }
    .status.running {
      display: block;
      color: #1976d2;
    }
    .status.done {
      display: block;
      color: #4caf50;
    }
    .status.error {
      display: block;
      color: #f44336;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #1976d2;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .not-found {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card" id="mainCard" style="display:none">
    <div class="header">
      <h1>🤖 Claude Code タスク承認</h1>
    </div>
    <div class="body">
      <div class="field">
        <label>タスク名</label>
        <div class="value" id="taskName"></div>
      </div>
      <div class="field">
        <label>指示内容</label>
        <div class="notes" id="taskNotes"></div>
      </div>
      <div class="warning">
        ⚠️ 「実行する」を押すと、Claude Code がこの指示に基づいてコードを書き換えます。内容を必ず確認してください。
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-execute" id="executeBtn" onclick="execute()">
        ▶ 実行する
      </button>
    </div>
    <div class="status" id="statusArea"></div>
  </div>

  <div class="card not-found" id="notFound" style="display:none">
    <h2>😕 タスクが見つかりません</h2>
    <p style="margin-top:8px">このリンクは無効か、すでに実行済みです。</p>
  </div>

  <script>
    // URLからトークンを取得
    const pathParts = window.location.pathname.split('/');
    const token = pathParts[pathParts.length - 1];

    // ページ読み込み時にタスク情報を取得
    async function loadTask() {
      try {
        const res = await fetch('/api/status/' + encodeURIComponent(token));
        if (!res.ok) {
          document.getElementById('notFound').style.display = 'block';
          return;
        }
        const data = await res.json();
        document.getElementById('mainCard').style.display = 'block';
        document.getElementById('taskName').textContent = data.taskName;
        document.getElementById('taskNotes').textContent = data.taskNotes || '(指示なし)';

        // すでに実行中/完了/エラーの場合はボタンを無効化
        if (data.status !== 'approval_pending') {
          document.getElementById('executeBtn').disabled = true;
          updateStatusDisplay(data.status, data.error);
        }
      } catch (err) {
        document.getElementById('notFound').style.display = 'block';
      }
    }

    // 実行ボタン
    async function execute() {
      var btn = document.getElementById('executeBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 実行開始中...';

      try {
        var res = await fetch('/api/approve/' + encodeURIComponent(token) + '/execute', { method: 'POST' });
        if (!res.ok) throw new Error('実行開始に失敗しました');

        updateStatusDisplay('running');
        pollStatus();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = '▶ 実行する';
        alert('エラー: ' + err.message);
      }
    }

    // ステータスポーリング（3秒ごと）
    function pollStatus() {
      var interval = setInterval(async function() {
        try {
          var res = await fetch('/api/status/' + encodeURIComponent(token));
          var data = await res.json();

          if (data.status === 'done' || data.status === 'error') {
            clearInterval(interval);
            updateStatusDisplay(data.status, data.error);
          }
        } catch (err) {
          // エラーは無視して次のサイクルへ
        }
      }, 3000);
    }

    function updateStatusDisplay(status, error) {
      var el = document.getElementById('statusArea');
      el.className = 'status ' + status;

      // textContentのみ使用（XSS防止）
      switch (status) {
        case 'running':
          el.textContent = '⏳ Claude Code 実行中... Asanaに結果が投稿されるまでお待ちください';
          break;
        case 'done':
          el.textContent = '✅ 実行完了！Asanaタスクに結果が投稿されました。';
          break;
        case 'error':
          el.textContent = '❌ エラーが発生しました。' + (error ? ' ' + error : '') + ' Asanaタスクを確認してください。';
          break;
      }
    }

    loadTask();
  </script>
</body>
</html>
