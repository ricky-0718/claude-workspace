<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A5FA6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>台湾スピーク</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/style.css?v=16">
</head>
<body>
  <div id="app">
    <!-- ログイン画面 -->
    <div id="login-screen" class="screen active">
      <div class="login-container">
        <h1>台湾スピーク</h1>
        <p class="subtitle">台湾で通じる中国語アプリ</p>

        <!-- ログインビュー -->
        <div id="login-view">
          <input type="text" id="login-name" placeholder="お名前">
          <input type="password" id="login-pass" placeholder="パスコード（4桁）" maxlength="4" inputmode="numeric">
          <button onclick="login()">ログイン</button>
          <p class="login-error" id="login-error"></p>
          <p class="login-switch">はじめての方は<a href="#" onclick="showRegisterView(); return false;">新規登録</a></p>
        </div>

        <!-- 新規登録ビュー -->
        <div id="register-view" style="display:none">
          <input type="text" id="reg-code" placeholder="招待コード" maxlength="8" style="text-transform:uppercase">
          <input type="text" id="reg-name" placeholder="お名前">
          <input type="password" id="reg-pass" placeholder="パスコード（4桁）" maxlength="4" inputmode="numeric">
          <input type="password" id="reg-pass2" placeholder="パスコード（確認）" maxlength="4" inputmode="numeric">
          <button onclick="register()">アカウントを作成</button>
          <p class="login-error" id="reg-error"></p>
          <p class="login-switch">アカウントをお持ちの方は<a href="#" onclick="showLoginView(); return false;">ログイン</a></p>
        </div>
      </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-screen" class="screen">
      <header>
        <h2 id="student-name"></h2>
        <!-- 共通レッスン選択 -->
        <div class="global-lesson-selector">
          <select id="lesson-select" onchange="selectLesson(this.value)">
            <option value="">レッスンを選択...</option>
          </select>
          <div class="lesson-progress-info" id="lesson-progress-info"></div>
        </div>
        <nav>
          <button class="nav-btn active" data-tab="drill">単語</button>
          <button class="nav-btn" data-tab="grammar">文法</button>
          <button class="nav-btn" data-tab="chat">会話</button>
        </nav>
      </header>

      <!-- 文法タブ -->
      <div id="grammar-tab" class="tab">
        <div id="grammar-content">
          <p class="empty-state" id="grammar-empty">レッスンを選択すると文法ポイントが表示されます</p>
          <div id="grammar-list"></div>
        </div>
      </div>

      <!-- 進捗サマリーバー -->
      <div id="progress-summary" class="progress-summary" style="display:none">
        <div class="progress-stat">
          <span class="stat-value" id="stat-streak">0</span>
          <span class="stat-label">日連続</span>
        </div>
        <div class="progress-stat">
          <span class="stat-value" id="stat-today">0</span>
          <span class="stat-label">今日</span>
        </div>
        <div class="progress-stat">
          <span class="stat-value" id="stat-mastered">0</span>
          <span class="stat-label">習得</span>
        </div>
        <div class="progress-stat review-stat" id="review-stat" style="display:none" onclick="startReviewMode()">
          <span class="stat-value" id="stat-review">0</span>
          <span class="stat-label">要復習</span>
        </div>
        <button class="share-btn" id="share-btn" onclick="shareMyScore()" title="学習成果をシェア">共有</button>
        <button class="progress-expand-btn" id="progress-expand-btn" onclick="toggleProgressGraph()">詳しく見る ▼</button>
      </div>

      <!-- 進捗グラフ（展開エリア） -->
      <div id="progress-graphs" class="progress-graphs" style="display:none">
        <div class="graph-section">
          <div class="graph-title">今週のアクティビティ</div>
          <div id="weekly-chart" class="weekly-chart"></div>
        </div>
        <div class="graph-section">
          <div class="graph-title">レッスン別マスター率</div>
          <div id="lesson-chart" class="lesson-chart"></div>
        </div>
      </div>

      <!-- 単語タブ -->
      <div id="drill-tab" class="tab active">
        <!-- モード切替 -->
        <div class="drill-mode-toggle" id="drill-mode-toggle" style="display:none">
          <button class="mode-btn active" data-mode="drill" onclick="switchDrillMode('drill')">発音ドリル</button>
          <button class="mode-btn" data-mode="quiz" onclick="switchDrillMode('quiz')">単語クイズ</button>
        </div>

        <!-- 発音ドリルモード -->
        <div id="drill-mode" class="drill-mode-content">
          <div class="drill-card" id="drill-card" style="display:none">
            <div class="drill-card-nav-wrapper">
              <button class="card-nav-btn card-nav-prev" onclick="prevDrill()" id="card-prev-btn">‹</button>
              <div class="drill-target" onclick="selectDrillTarget('word')">
                <p class="hanzi" id="drill-hanzi"></p>
                <p class="pinyin" id="drill-pinyin"></p>
                <p class="translation" id="drill-translation"></p>
                <div class="drill-last-score" id="drill-last-score" style="display:none"></div>
                <div class="drill-audio-btns">
                  <button class="play-btn" onclick="event.stopPropagation(); playExample()" id="play-btn">お手本を聞く</button>
                  <button class="play-btn playback-btn" id="playback-btn" style="display:none" onclick="event.stopPropagation(); playRecording()">自分の録音を聞く</button>
                </div>
              </div>
              <button class="card-nav-btn card-nav-next" onclick="nextDrill()" id="card-next-btn">›</button>
            </div>

            <div class="recorder">
              <button class="record-btn" id="record-btn" onclick="toggleRecord()">
                <span id="record-label">録音開始</span>
              </button>
              <div class="recording-indicator" id="recording-indicator"></div>
            </div>

            <div class="score-panel" id="score-panel" style="display:none">
              <div class="score-row">
                <span class="score-label">音の高さ</span>
                <div class="score-bar"><div class="score-fill tone" id="score-tone"></div></div>
                <span class="score-value" id="score-tone-val"></span>
              </div>
              <div class="score-row">
                <span class="score-label">出だしの音</span>
                <div class="score-bar"><div class="score-fill initial" id="score-initial"></div></div>
                <span class="score-value" id="score-initial-val"></span>
              </div>
              <div class="score-row">
                <span class="score-label">後半の音</span>
                <div class="score-bar"><div class="score-fill final" id="score-final"></div></div>
                <span class="score-value" id="score-final-val"></span>
              </div>
              <div class="score-row score-row-overall">
                <span class="score-label">総合</span>
                <div class="score-bar"><div class="score-fill overall" id="score-overall"></div></div>
                <span class="score-value" id="score-overall-val"></span>
              </div>
              <p class="score-note">総合は発音＋流暢さ（テンポ・つなぎ方）を含みます</p>
              <div class="word-scores" id="word-scores"></div>
            </div>

            <div class="drill-examples" id="drill-examples"></div>

            <div class="drill-nav">
              <button onclick="prevDrill()">前へ</button>
              <span id="drill-progress">1 / 10</span>
              <button onclick="nextDrill()">次へ</button>
            </div>
          </div>
        </div>

        <!-- クイズモード -->
        <div id="quiz-mode" class="drill-mode-content" style="display:none">
          <div class="quiz-setup" id="quiz-setup">
            <div class="quiz-type-selector">
              <button class="quiz-type-btn active" data-type="zh_to_ja" onclick="selectQuizType('zh_to_ja')">中→日</button>
              <button class="quiz-type-btn" data-type="ja_to_zh" onclick="selectQuizType('ja_to_zh')">日→中</button>
              <button class="quiz-type-btn" data-type="pinyin_to_zh" onclick="selectQuizType('pinyin_to_zh')">ピンイン→漢字</button>
            </div>
            <button class="quiz-start-btn" onclick="startQuiz()">クイズ開始</button>
          </div>

          <div class="quiz-card" id="quiz-card" style="display:none">
            <div class="quiz-progress-bar">
              <div class="quiz-progress-fill" id="quiz-progress-fill"></div>
            </div>
            <div class="quiz-counter" id="quiz-counter">1 / 10</div>
            <div class="quiz-question" id="quiz-question"></div>
            <div class="quiz-choices" id="quiz-choices"></div>
          </div>

          <div class="quiz-result" id="quiz-result" style="display:none">
            <div class="quiz-score-circle" id="quiz-score-circle">
              <span class="quiz-score-num" id="quiz-score-num">0</span>
              <span class="quiz-score-label">正解</span>
            </div>
            <div class="quiz-result-details" id="quiz-result-details"></div>
            <button class="quiz-retry-btn" onclick="startQuiz()">もう一度</button>
            <button class="quiz-share-btn" onclick="shareQuizScore()">結果をシェア</button>
          </div>
        </div>

        <p class="empty-state" id="drill-empty">レッスンを選択すると単語ドリルが表示されます</p>
      </div>

      <!-- 会話タブ -->
      <div id="chat-tab" class="tab">
        <div class="scenario-selector" id="scenario-selector">
          <div class="scenario-header">
            <span>会話モード</span>
            <button class="scenario-back-btn" id="scenario-back-btn" style="display:none" onclick="showScenarioList()">変更</button>
          </div>
          <div class="scenario-grid" id="scenario-grid"></div>
          <div class="scenario-active" id="scenario-active" style="display:none"></div>
        </div>

        <div class="chat-messages" id="chat-messages">
          <div class="msg assistant">
            <div class="msg-content">
              <p>你好！我是你的華語老師。請用中文跟我聊天吧！</p>
            </div>
          </div>
        </div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="繁體中文で入力..."
                 onkeydown="if(event.key==='Enter')sendChat()">
          <button onclick="sendChat()">送信</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js?v=16"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // 古いSWを削除して最新に更新
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.update());
      });
      navigator.serviceWorker.register('/sw.js?v=16').catch(() => {});
    }
  </script>
</body>
</html>
